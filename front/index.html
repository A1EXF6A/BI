<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BI Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h1>📊 BI Dashboard</h1>

<nav>
    <button onclick="showSection('metrics')">Métricas</button>
    <button onclick="showSection('clusters')">Clusters</button>
    <button onclick="showSection('recommend')">Recomendaciones</button>
</nav>

<!-- SELECTOR DE TABLAS -->
<section id="tableSelector">
    <h2>Selecciona una tabla de hechos</h2>
    <select id="factTable">
        <option value="FactVentas">Ventas</option>
        <option value="FactAbastecimiento">Abastecimiento</option>
        <option value="FactDistribucion">Distribución</option>
        <option value="FactFabricacion">Fabricación</option>
        <option value="FactInventario">Inventario</option>
        <option value="FactVentasCombo">Ventas Combo</option>
    </select>
</section>

<!-- METRICAS -->
<section id="metrics" class="section">
    <h2>Métricas</h2>
    <button onclick="loadMetrics()">Cargar Métricas</button>

    <div id="metricsResult"></div>
    <!-- Gráfico de métricas -->
    <div style="width:600px; max-width:100%;">
        <canvas id="metricsChart"></canvas>
    </div>
</section>

<!-- CLUSTERS -->
<section id="clusters" class="section hidden">
    <h2>Clusters</h2>
    <div class="cluster-controls">
        <label for="clusterSample" style="margin-right:8px;">Registros a devolver:</label>
        <input id="clusterSample" type="number" min="0" value="500" style="width:100px; margin-right:12px;">
        <button onclick="loadClusters()">Generar Clusters</button>
    </div>

    <div style="display:flex; gap:20px; flex-wrap:wrap;">
        <div style="flex-basis:100%;">
            <div id="clustersResult"></div>
        </div>
        <div style="flex:1 1 60%; min-width:320px;">
            <div id="clustersLegend"></div>
            <div id="clustersResult" style="margin-top:8px"></div>
            <div style="width:100%; max-width:100%; margin-top:12px;">
                <canvas id="clustersRadar" style="width:100%; height:360px;"></canvas>
            </div>
        </div>
        <div style="flex:1 1 35%; min-width:320px;">
            <div style="width:100%; max-width:100%; margin-bottom:12px;">
                <canvas id="clustersBarCompare" style="width:100%; height:240px;"></canvas>
            </div>
            <div style="width:100%; max-width:100%; margin-top:6px;">
                <canvas id="clustersDistribution" style="width:100%; height:200px;"></canvas>
            </div>
        </div>
    </div>
</section>

<!-- RECOMENDACIONES -->
<section id="recommend" class="section hidden">
    <h2>Recomendaciones</h2>

    <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
        <label for="recommendMethod">Método:</label>
        <select id="recommendMethod">
            <option value="collaborative">Filtrado colaborativo (clientes)</option>
            <option value="inventory_similarity">Similitud (Inventario)</option>
            <option value="content">Basado en contenido</option>
            <option value="similarity">Similitud por ventas</option>
        </select>
        <label for="topN">Top</label>
        <input id="topN" type="number" min="1" value="5" style="width:64px">
    </div>

    <div style="display:flex; gap:12px; margin-bottom:8px;">
        <div>
            <label>ClienteKey (colaborativo)</label><br>
            <input id="clienteInput" type="number" placeholder="ClienteKey">
        </div>
        <div>
            <label>Producto (nombre o key)</label><br>
            <input id="productoInput" type="text" placeholder="Nombre del producto o ProductoKey">
        </div>
        <div style="align-self:flex-end">
            <button onclick="getRecommendations()">Recomendar</button>
        </div>
    </div>

    <div id="recommendResults">
        <ul id="recommendList"></ul>
    </div>
</section>

<script src="js/api.js"></script>
<script src="js/metrics.js"></script>
<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/clustering.js"></script>
<script src="js/recommendation.js"></script>
<script src="js/app.js"></script>

</body>
</html>
